# CD — build on Cloud Build, deploy to Cloud Run, then apply the DB migration.
#
# Trigger: push to main. The deploy job needs CI (typecheck + tests + build) to
# pass first — see `needs: ci` below, which reuses the same job as ci.yml via a
# duplicated lightweight gate so a red build never ships.
#
# Auth uses Workload Identity Federation (keyless) — NOT a JSON service-account
# key. This repo is PUBLIC and CLAUDE.md forbids SA key files in the repo, so we
# never store a long-lived credential anywhere.
#
# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED GitHub configuration (Settings → Secrets and variables → Actions)
#
# Repository VARIABLES (non-secret, "Variables" tab):
#   GCP_PROJECT          sml-interview-sandbox
#   GCP_REGION           us-central1
#   GCP_AR_REPO          mdjamal-registry          (Artifact Registry repo)
#   CLOUD_RUN_SERVICE    mdjamal-app
#   GCP_SA_EMAIL         github-deployer@sml-interview-sandbox.iam.gserviceaccount.com
#   GCP_WIF_PROVIDER     projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#
# Repository SECRETS ("Secrets" tab):
#   MIGRATE_TOKEN        the NEXTAUTH_SECRET value — store the CLEAN 44-char
#                        secret WITHOUT a trailing newline. The running Cloud Run
#                        service's NEXTAUTH_SECRET ends in a "\n" (its secret is
#                        pinned to an older version that had one; verified live:
#                        clean token -> 401, token+"\n" -> 200). The migrate step
#                        below strips any stray newline and appends exactly one
#                        before URL-encoding, so a clean paste matches the route.
#
# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME WIF SETUP (run once by a project owner; replace PROJECT_NUMBER and the
# GitHub "owner/repo"). These create the pool, a deploy SA, and the bindings.
#
#   PROJECT=sml-interview-sandbox
#   PROJECT_NUMBER=$(gcloud projects describe "$PROJECT" --format='value(projectNumber)')
#   REPO=<github-owner>/<github-repo>          # e.g. mdjamal/social-network
#
#   # 1. Deploy service account
#   gcloud iam service-accounts create github-deployer \
#     --project="$PROJECT" --display-name="GitHub Actions deployer"
#   SA=github-deployer@$PROJECT.iam.gserviceaccount.com
#
#   # 2. Roles the deploy needs (Cloud Build, Cloud Run, Artifact Registry,
#   #    plus actAs on the runtime SA used by the Cloud Run service).
#   for ROLE in roles/run.admin roles/cloudbuild.builds.editor \
#               roles/artifactregistry.writer roles/storage.admin \
#               roles/iam.serviceAccountUser; do
#     gcloud projects add-iam-policy-binding "$PROJECT" \
#       --member="serviceAccount:$SA" --role="$ROLE"
#   done
#
#   # 3. Workload Identity pool + GitHub OIDC provider
#   gcloud iam workload-identity-pools create github-pool \
#     --project="$PROJECT" --location=global --display-name="GitHub pool"
#
#   gcloud iam workload-identity-pools providers create-oidc github-provider \
#     --project="$PROJECT" --location=global \
#     --workload-identity-pool=github-pool \
#     --display-name="GitHub provider" \
#     --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#     --attribute-condition="assertion.repository=='$REPO'" \
#     --issuer-uri="https://token.actions.githubusercontent.com"
#
#   # 4. Let this repo impersonate the deploy SA via the pool
#   gcloud iam service-accounts add-iam-policy-binding "$SA" \
#     --project="$PROJECT" --role=roles/iam.workloadIdentityUser \
#     --member="principalSet://iam.googleapis.com/projects/$PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/attribute.repository/$REPO"
#
#   # 5. GCP_WIF_PROVIDER value to paste into GitHub:
#   echo "projects/$PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
#
# The Cloud Run service still reads DATABASE_URL / NEXTAUTH_SECRET / NEXTAUTH_URL
# from Secret Manager (wired on the service); this workflow does not set them.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  # Never run two deploys at once; let an in-flight deploy finish.
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  # Re-run the CI gate so a broken main can never deploy. Mirrors ci.yml.
  ci:
    name: CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  deploy:
    name: Build & deploy to Cloud Run
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF, keyless)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image (Cloud Build)
        env:
          PROJECT: ${{ vars.GCP_PROJECT }}
          REGION: ${{ vars.GCP_REGION }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/${{ vars.GCP_AR_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}"
          MIGRATE_IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/${{ vars.GCP_AR_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}-migrate:${{ github.sha }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "MIGRATE_IMAGE=$MIGRATE_IMAGE" >> "$GITHUB_ENV"
          # Two images are built from the one multi-stage Dockerfile via
          # cloudbuild.yaml: the lean app image (runner stage) and the migrate
          # image (migrate stage, which carries the Prisma CLI + migrations).
          # The deploy SA intentionally lacks project Viewer/Owner, so gcloud
          # cannot stream regional Cloud Build logs and exits 1 even when the
          # build SUCCEEDS. So submit --async and poll the build status ourselves;
          # this never touches log streaming and needs only builds.get, which
          # roles/cloudbuild.builds.editor already grants. Full logs stay in the
          # Cloud Build console (URL printed below).
          BUILD_ID=$(gcloud builds submit \
            --project="$PROJECT" --region="$REGION" \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE="$IMAGE",_MIGRATE_IMAGE="$MIGRATE_IMAGE" \
            --async --format='value(id)' .)
          echo "Submitted Cloud Build: $BUILD_ID"
          echo "Logs: https://console.cloud.google.com/cloud-build/builds;region=$REGION/$BUILD_ID?project=$PROJECT"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project="$PROJECT" --region="$REGION" --format='value(status)')
            echo "build status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "Build succeeded."; break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Build ended with status: $STATUS"; exit 1 ;;
            esac
            sleep 5
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="$IMAGE" \
            --quiet
          URL=$(gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT }}" \
            --region="${{ vars.GCP_REGION }}" \
            --format='value(status.url)')
          echo "SERVICE_URL=$URL" >> "$GITHUB_ENV"

      - name: Apply DB migration (Prisma, idempotent)
        run: |
          # Prisma migrations are applied by the mdjamal-migrate Cloud Run Job,
          # which runs `prisma migrate deploy` inside the VPC with the Cloud SQL
          # instance attached (Cloud SQL is private-IP only). This replaces the
          # old token-guarded `curl .../api/migrate` — no MIGRATE_TOKEN /
          # trailing-newline dance needed; the Job authenticates via its runtime
          # SA + the Cloud SQL binding. `migrate deploy` is idempotent (skips
          # already-applied migrations) and takes a Postgres advisory lock.
          #
          # The Job runs the dedicated migrate image ($MIGRATE_IMAGE, built from
          # the Dockerfile `migrate` stage whose CMD is `prisma migrate deploy`).
          # Point the Job at the freshly-built image, then execute and wait.
          gcloud run jobs update mdjamal-migrate \
            --project="${{ vars.GCP_PROJECT }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="$MIGRATE_IMAGE" \
            --quiet
          gcloud run jobs execute mdjamal-migrate \
            --project="${{ vars.GCP_PROJECT }}" \
            --region="${{ vars.GCP_REGION }}" \
            --wait
